name: Jouzu
options:
  bundleIdPrefix: com.jouzu
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: ""

packages:
  MeCab-Swift:
    url: https://github.com/shinjukunian/Mecab-Swift.git
    from: "0.4.0"

targets:
  Jouzu:
    type: application
    platform: iOS
    sources:
      - Jouzu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jouzu.app
        INFOPLIST_FILE: Jouzu/Info.plist
        INFOPLIST_KEY_NSCameraUsageDescription: "Jouzu needs camera access to photograph Japanese text for translation and vocabulary building."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Jouzu needs photo library access to import images of Japanese text."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Jouzu"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: MeCab-Swift
        product: Mecab-Swift
      - package: MeCab-Swift
        product: IPADic
  JouzuTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - JouzuTests
    dependencies:
      - target: Jouzu
